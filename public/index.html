<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Options Scanner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #161a22;
    --surface2:  #1e2330;
    --border:    #2a3040;
    --text:      #e2e8f0;
    --muted:     #6b7280;
    --long:      #22c55e;
    --long-dim:  #166534;
    --short:     #ef4444;
    --short-dim: #7f1d1d;
    --accent:    #6366f1;
    --pass:      #22c55e;
    --fail:      #ef4444;
    --warn:      #f59e0b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; flex: 1; }
  .header-meta { color: var(--muted); font-size: 11px; }

  /* ── Tabs ──────────────────────────────────────────────────────────────── */
  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 16px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); opacity: 1; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Controls ──────────────────────────────────────────────────────────── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  input[type="text"], input[type="number"], select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 12px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }
  input[type="text"]:focus,
  input[type="number"]:focus,
  select:focus,
  textarea:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  textarea { min-height: 74px; resize: vertical; width: 100%; }
  select option { background: var(--surface2); }

  #tickerInput { width: 320px; }
  #gradeFilter, #sortMode { min-width: 150px; }

  button {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 18px;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn-sm { padding: 5px 12px; font-size: 11px; }
  .btn-log { background: #1e3a5f; border: 1px solid #2563eb; color: #93c5fd; }

  #status { color: var(--muted); font-size: 11px; margin-left: auto; }

  /* ── Scanner panel ─────────────────────────────────────────────────────── */
  main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  #summary { margin-bottom: 16px; color: var(--muted); font-size: 11px; }

  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .empty { grid-column: 1 / -1; text-align: center; padding: 60px 0; color: var(--muted); }

  /* ── Setup card ────────────────────────────────────────────────────────── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .ticker { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; }
  .card-header-right { display: flex; align-items: center; gap: 8px; }

  .badge { border-radius: 5px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; padding: 3px 10px; text-transform: uppercase; }
  .badge-long  { background: var(--long-dim);  color: var(--long); }
  .badge-short { background: var(--short-dim); color: var(--short); }
  .grade-badge {
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
    min-width: 34px;
    padding: 3px 8px;
    text-align: center;
  }
  .grade-a { background: rgba(34,197,94,0.14); border-color: rgba(34,197,94,0.35); color: #86efac; }
  .grade-b { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.38); color: #a5b4fc; }
  .grade-c { background: rgba(245,158,11,0.13); border-color: rgba(245,158,11,0.34); color: #fcd34d; }
  .grade-d { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.34); color: #fca5a5; }

  .card-body { padding: 14px 16px; }

  .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .price-big { font-size: 22px; font-weight: 700; }
  .price-meta { color: var(--muted); font-size: 11px; }

  .ind-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .ind-cell { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; }
  .ind-label { color: var(--muted); font-size: 10px; margin-bottom: 2px; }
  .ind-value { font-size: 13px; font-weight: 600; }

  .levels-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
  .levels-table th { color: var(--muted); font-weight: 500; padding: 4px 6px; text-align: left; border-bottom: 1px solid var(--border); }
  .levels-table td { padding: 5px 6px; border-bottom: 1px solid var(--border); }
  .levels-table tr:last-child td { border-bottom: none; }
  .level-sl    { color: var(--short); }
  .level-tp    { color: var(--long); }
  .level-entry { color: var(--warn); }
  .rr { color: var(--muted); font-size: 11px; }

  .option-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; }
  .option-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .option-symbol { font-size: 14px; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 4px; }
  .option-meta { color: var(--muted); font-size: 11px; }

  .coach-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; }
  .coach-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
  .coach-title { color: var(--text); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .coach-score { color: var(--muted); font-size: 10px; white-space: nowrap; }
  .coach-grade-note { color: var(--muted); font-size: 10px; line-height: 1.35; margin: -2px 0 8px; }
  .coach-grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:7px; margin-bottom:8px; }
  .coach-metric { border: 1px solid rgba(42,48,64,0.75); border-radius:5px; padding:6px 8px; min-width:0; }
  .coach-label { color: var(--muted); font-size:9px; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:2px; }
  .coach-value { color: var(--text); font-size:11px; overflow-wrap:anywhere; }
  .coach-note { color:#bfdbfe; background:rgba(37,99,235,0.08); border:1px solid rgba(37,99,235,0.18); border-radius:5px; padding:7px 9px; font-size:11px; line-height:1.45; margin-bottom:7px; }
  .coach-warning { color:#fca5a5; background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.18); border-radius:5px; padding:7px 9px; font-size:11px; line-height:1.45; margin-bottom:7px; }
  .coach-prompt { color:#fcd34d; font-size:11px; line-height:1.45; }

  .checklist { border-top: 1px solid var(--border); padding-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .check-item { display: flex; align-items: center; gap: 6px; font-size: 11px; padding: 3px 0; }
  .check-item .icon { font-size: 12px; }
  .check-item.pass { color: var(--pass); }
  .check-item.fail { color: var(--fail); }
  .check-item.warn { color: var(--warn); }

  .card-footer { padding: 10px 16px; border-top: 1px solid var(--border); }

  /* ── Modal ─────────────────────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 14px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; }
  .modal-close:hover { color: var(--text); opacity: 1; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-row input[type="text"],
  .form-row input[type="number"],
  .form-row select,
  .form-row textarea { width: 100%; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .setup-review {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.45;
    margin-bottom: 14px;
    padding: 10px 12px;
  }
  .setup-review strong { color: var(--text); }

  /* ── Journal panel ─────────────────────────────────────────────────────── */
  #journal-panel { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  .journal-controls {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .journal-controls select { min-width: 120px; }

  .journal-stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .stat-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-value.green { color: var(--long); }
  .stat-value.red   { color: var(--short); }
  .stat-value.muted { color: var(--muted); }

  .journal-table-wrap { overflow-x: auto; }
  .journal-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    white-space: nowrap;
  }
  .journal-table th {
    color: var(--muted); font-weight: 500; font-size: 11px;
    padding: 8px 12px; text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0;
  }
  .journal-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .journal-table tr:hover td { background: var(--surface2); }
  .journal-table tr.win  td { border-left: 3px solid var(--long); }
  .journal-table tr.loss td { border-left: 3px solid var(--short); }
  .journal-table tr.open td { border-left: 3px solid var(--warn); }

  .result-badge {
    border-radius: 4px; font-size: 10px; font-weight: 700;
    padding: 2px 8px; text-transform: uppercase;
  }
  .result-win  { background: var(--long-dim);  color: var(--long); }
  .result-loss { background: var(--short-dim); color: var(--short); }
  .result-open { background: #1c1a08; color: var(--warn); }

  .pnl-pos { color: var(--long); }
  .pnl-neg { color: var(--short); }

  .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 2px 6px; }
  .delete-btn:hover { color: var(--short); opacity: 1; }
  .edit-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 2px 6px; }
  .edit-btn:hover { color: var(--accent); opacity: 1; }

  .journal-empty { text-align: center; padding: 60px 0; color: var(--muted); }

  /* ── Analytics panel ──────────────────────────────────────────────────── */
  #analytics-panel { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .analytics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }
  .analytics-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .analytics-card h3 {
    color: var(--text);
    font-size: 12px;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .analytics-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  .analytics-table th {
    color: var(--muted);
    font-weight: 500;
    padding: 6px 4px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .analytics-table td {
    padding: 7px 4px;
    border-bottom: 1px solid rgba(42,48,64,0.75);
  }
  .analytics-table tr:last-child td { border-bottom: none; }
  .analytics-empty { color: var(--muted); padding: 32px 0; text-align: center; }

  /* ── Spinner ───────────────────────────────────────────────────────────── */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>📈 Stock Options Scanner</h1>
  <span class="header-meta">BOS + Order Block · Daily · 2R+ minimum</span>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('scanner')">Scanner</button>
  <button class="tab-btn" onclick="switchTab('journal')">Journal</button>
  <button class="tab-btn" onclick="switchTab('analytics')">Analytics</button>
</div>

<!-- ── Scanner Tab ───────────────────────────────────────────────────────── -->
<div id="scanner-panel" class="tab-panel active">
  <div class="controls">
    <input type="text" id="tickerInput" placeholder="Custom tickers (e.g. TSLA,META,GOOG) — leave blank for full watchlist" />
    <select id="gradeFilter" onchange="renderScannerResults()">
      <option value="all">All grades</option>
      <option value="a">A range only</option>
      <option value="bplus">B+ and up</option>
      <option value="b">B and up</option>
      <option value="hide-c">Hide C/D</option>
      <option value="learning">Best learning setups</option>
    </select>
    <select id="sortMode" onchange="renderScannerResults()">
      <option value="quality">Sort by quality</option>
      <option value="ticker">Sort by ticker</option>
      <option value="direction">Sort by direction</option>
      <option value="price">Sort by price</option>
    </select>
    <button id="scanBtn" onclick="runScan()">Scan</button>
    <button class="btn-secondary" onclick="clearResults()">Clear</button>
    <span id="status"></span>
  </div>
  <main>
    <div id="summary"></div>
    <div id="results"></div>
    <div id="near-miss-section" style="display:none; margin-top:28px;">
      <div id="near-miss-header" style="color:#6b7280; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #2a3040;">
        Developing Setups — Near Miss
      </div>
      <div id="near-miss-results" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px;"></div>
    </div>
  </main>
</div>

<!-- ── Journal Tab ───────────────────────────────────────────────────────── -->
<div id="journal-panel" class="tab-panel">
  <div class="journal-stats" id="journalStats"></div>
  <div class="journal-controls">
    <input type="text" id="filterTicker" placeholder="Filter ticker..." style="width:130px" oninput="renderJournal()" />
    <select id="filterGrade" onchange="renderJournal()">
      <option value="">All grades</option>
      <option value="A+">A+</option>
      <option value="A">A</option>
      <option value="B+">B+</option>
      <option value="B">B</option>
      <option value="C+">C+</option>
      <option value="C">C</option>
      <option value="D">D</option>
      <option value="Untracked">Untracked</option>
    </select>
    <select id="filterDirection" onchange="renderJournal()">
      <option value="">All directions</option>
      <option value="LONG">LONG</option>
      <option value="SHORT">SHORT</option>
    </select>
    <select id="filterResult" onchange="renderJournal()">
      <option value="">All results</option>
      <option value="Win">Win</option>
      <option value="Loss">Loss</option>
      <option value="Open">Open</option>
    </select>
    <select id="filterQuality" onchange="renderJournal()">
      <option value="">All quality</option>
      <option value="Good Trade">Good Trade</option>
      <option value="Bad Trade">Bad Trade</option>
      <option value="Good Idea, Bad Execution">Good Idea, Bad Execution</option>
      <option value="Unreviewed">Unreviewed</option>
    </select>
    <button class="btn-secondary btn-sm" onclick="exportCSV()">Export CSV</button>
    <button class="btn-secondary btn-sm" style="color:var(--short)" onclick="clearJournal()">Clear All</button>
  </div>
  <div class="journal-table-wrap">
    <div id="journalBody"></div>
  </div>
</div>

<!-- ── Analytics Tab ─────────────────────────────────────────────────────── -->
<div id="analytics-panel" class="tab-panel">
  <div class="journal-stats" id="analyticsStats"></div>
  <div class="analytics-grid">
    <div class="analytics-card">
      <h3>By Grade</h3>
      <div id="analyticsByGrade"></div>
    </div>
    <div class="analytics-card">
      <h3>By Direction</h3>
      <div id="analyticsByDirection"></div>
    </div>
    <div class="analytics-card">
      <h3>Top Tickers</h3>
      <div id="analyticsByTicker"></div>
    </div>
    <div class="analytics-card">
      <h3>Review Quality</h3>
      <div id="analyticsByQuality"></div>
    </div>
    <div class="analytics-card">
      <h3>Mistake Types</h3>
      <div id="analyticsByMistake"></div>
    </div>
    <div class="analytics-card">
      <h3>Open Trades</h3>
      <div id="analyticsOpenTrades"></div>
    </div>
  </div>
</div>

<!-- ── Log Trade Modal ───────────────────────────────────────────────────── -->
<div class="modal-overlay" id="logModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">📊 Log Trade</h2>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="setup-review" id="setupReviewBox">
        <strong>Setup context</strong><br />
        Log from a scanner setup to attach grade, score, and coach context.
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Ticker</label>
          <input type="text" id="f_ticker" />
        </div>
        <div class="form-row">
          <label>Direction</label>
          <select id="f_direction">
            <option value="LONG">LONG</option>
            <option value="SHORT">SHORT</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Option Contract</label>
        <input type="text" id="f_option" placeholder="e.g. AAPL MAY 29 $200 C" />
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Entry / Planned Level</label>
          <input type="number" id="f_entry" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-row">
          <label>Contracts</label>
          <input type="number" id="f_contracts" step="1" min="1" value="1" />
        </div>
      </div>
      <div class="form-grid-3">
        <div class="form-row">
          <label>Planned Stop</label>
          <input type="number" id="f_plannedStop" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-row">
          <label>Planned TP1</label>
          <input type="number" id="f_plannedTp1" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-row">
          <label>R Result</label>
          <input type="number" id="f_rResult" step="0.01" placeholder="auto / manual" />
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Expiry Date</label>
          <input type="text" id="f_expiry" placeholder="YYYY-MM-DD" />
        </div>
        <div class="form-row">
          <label>Result</label>
          <select id="f_result">
            <option value="Open">Open</option>
            <option value="Win">Win</option>
            <option value="Loss">Loss</option>
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Exit / Close Level</label>
          <input type="number" id="f_exit" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-row">
          <label>P&amp;L ($)</label>
          <input type="number" id="f_pnl" step="0.01" placeholder="auto-calc or override" />
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Trade Quality</label>
          <select id="f_tradeQuality">
            <option value="Unreviewed">Unreviewed</option>
            <option value="Good Trade">Good Trade</option>
            <option value="Bad Trade">Bad Trade</option>
            <option value="Good Idea, Bad Execution">Good Idea, Bad Execution</option>
          </select>
        </div>
        <div class="form-row">
          <label>Followed Plan</label>
          <select id="f_followedPlan">
            <option value="Unreviewed">Unreviewed</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="Partial">Partial</option>
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Outcome</label>
          <select id="f_outcome">
            <option value="Open">Open</option>
            <option value="TP1">TP1</option>
            <option value="TP2">TP2</option>
            <option value="TP3">TP3</option>
            <option value="Stop Loss">Stop Loss</option>
            <option value="Manual Close">Manual Close</option>
            <option value="Expired">Expired</option>
          </select>
        </div>
        <div class="form-row">
          <label>Mistake Type</label>
          <select id="f_mistakeType">
            <option value="">None / not reviewed</option>
            <option value="Early Entry">Early Entry</option>
            <option value="Late Entry">Late Entry</option>
            <option value="Chased">Chased</option>
            <option value="Ignored Warning">Ignored Warning</option>
            <option value="Bad Exit">Bad Exit</option>
            <option value="Size Too Large">Size Too Large</option>
            <option value="Emotional Trade">Emotional Trade</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Review Notes</label>
        <textarea id="f_notes" placeholder="What did you see, what did you do, and what should you repeat or avoid?"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModalDirect()">Cancel</button>
      <button id="modalSaveBtn" onclick="saveJournalEntry()">Save Trade</button>
    </div>
  </div>
</div>

<script>
const API = '';
const JOURNAL_KEY = 'stock_scanner_journal';
let scannerRows = [];
let scannerNearMiss = [];

// ── Tab switching ────────────────────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['scanner','journal','analytics'][i] === tab);
  });
  document.getElementById('scanner-panel').classList.toggle('active', tab === 'scanner');
  document.getElementById('journal-panel').classList.toggle('active', tab === 'journal');
  document.getElementById('analytics-panel').classList.toggle('active', tab === 'analytics');
  if (tab === 'journal') renderJournal();
  if (tab === 'analytics') renderAnalytics();
}

// ── Scanner ──────────────────────────────────────────────────────────────────

async function runScan() {
  const btn     = document.getElementById('scanBtn');
  const status  = document.getElementById('status');
  const input   = document.getElementById('tickerInput').value.trim();
  const results = document.getElementById('results');
  const summary = document.getElementById('summary');

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span>Scanning...';
  results.innerHTML = '';
  summary.textContent = '';

  try {
    const url = input
      ? `${API}/api/scan?tickers=${encodeURIComponent(input)}`
      : `${API}/api/scan`;
    const res  = await fetch(url);
    const data = await res.json();

    scannerRows = data.rows || [];
    scannerNearMiss = data.near_miss || [];
    renderScannerResults();
  } catch (e) {
    status.textContent = `Error: ${e.message}`;
    results.innerHTML = '<div class="empty">Scan failed — is the server running?</div>';
  } finally {
    btn.disabled = false;
    status.innerHTML = status.innerHTML.includes('Error') ? status.innerHTML : 'Done';
  }
}

function clearResults() {
  scannerRows = [];
  scannerNearMiss = [];
  document.getElementById('results').innerHTML = '';
  document.getElementById('near-miss-results').innerHTML = '';
  document.getElementById('near-miss-section').style.display = 'none';
  document.getElementById('summary').textContent = '';
  document.getElementById('status').textContent = '';
}

function gradeRank(grade) {
  return { 'A+': 6, 'A': 5, 'B+': 4, 'B': 3, 'C+': 2, 'C': 1, 'D': 0 }[grade] ?? 0;
}

function gradeClass(grade) {
  return grade?.startsWith('A') ? 'grade-a' : grade?.startsWith('B') ? 'grade-b' : grade?.startsWith('C') ? 'grade-c' : 'grade-d';
}

function setupRank(s) {
  return gradeRank(s.quality?.grade);
}

function passesGradeFilter(s, filter) {
  const q = s.quality || {};
  const rank = setupRank(s);
  if (filter === 'a') return rank >= gradeRank('A');
  if (filter === 'bplus') return rank >= gradeRank('B+');
  if (filter === 'b' || filter === 'hide-c') return rank >= gradeRank('B');
  if (filter === 'learning') {
    return rank >= gradeRank('B') && Boolean(q.warning) && q.warning !== 'No major visual warning; still wait for the chart to confirm the plan.';
  }
  return true;
}

function sortSetups(rows, mode) {
  return rows.slice().sort((a, b) => {
    if (mode === 'ticker') return a.ticker.localeCompare(b.ticker);
    if (mode === 'direction') return `${a.direction || ''}-${a.ticker}`.localeCompare(`${b.direction || ''}-${b.ticker}`);
    if (mode === 'price') return (b.price || 0) - (a.price || 0);
    return (b.quality?.score || 0) - (a.quality?.score || 0);
  });
}

function renderScannerResults() {
  const results = document.getElementById('results');
  const summary = document.getElementById('summary');
  const filter = document.getElementById('gradeFilter')?.value || 'all';
  const sortMode = document.getElementById('sortMode')?.value || 'quality';

  const rows = sortSetups(scannerRows.filter(s => passesGradeFilter(s, filter)), sortMode);
  const nearMiss = sortSetups(scannerNearMiss.filter(s => passesGradeFilter(s, filter)), sortMode);
  const totalVisible = rows.length + nearMiss.length;

  if (rows.length === 0) {
    results.innerHTML = '<div class="empty">No qualified setups match this filter — check Developing section below.</div>';
  } else {
    results.innerHTML = rows.map(renderCard).join('');
  }

  const longs = rows.filter(s => s.direction === 'LONG').length;
  const shorts = rows.filter(s => s.direction === 'SHORT').length;
  const filterLabel = document.getElementById('gradeFilter')?.selectedOptions?.[0]?.textContent || 'All grades';
  summary.textContent = `${rows.length} qualified setup${rows.length !== 1 ? 's' : ''} shown — ${longs} Long, ${shorts} Short · ${filterLabel} · ${totalVisible} total including developing`;

  const nmSection = document.getElementById('near-miss-section');
  const nmResults = document.getElementById('near-miss-results');
  const nmHeader = document.getElementById('near-miss-header');
  if (nearMiss.length > 0) {
    nmHeader.textContent = `Developing Setups — Near Miss (${nearMiss.length})`;
    nmResults.innerHTML = nearMiss.map(renderNearMissCard).join('');
    nmSection.style.display = 'block';
  } else {
    nmSection.style.display = 'none';
  }
}

function renderCard(s) {
  const isLong  = s.direction === 'LONG';
  const c       = s.checklist || {};
  const q       = s.quality || {};
  const grade   = q.grade || 'C';
  const gradeCls = gradeClass(grade);
  const ci      = (pass, label) =>
    `<div class="check-item ${pass ? 'pass' : 'fail'}"><span class="icon">${pass ? '✓' : '✗'}</span>${label}</div>`;
  const riskPct = s.entry > 0 ? ((s.risk / s.entry) * 100).toFixed(1) : '—';
  const encoded = encodeURIComponent(JSON.stringify(s));
  const obLabel = s.in_ob ? 'Inside OB' : s.near_ob ? 'Near OB' : 'At OB';
  const coachBox = renderCoachBox(q);

  return `
  <div class="card">
    <div class="card-header">
      <span class="ticker">${s.ticker}</span>
      <div class="card-header-right">
        <span class="grade-badge ${gradeCls}" title="Chart quality grade">${grade}</span>
        <span class="badge ${isLong ? 'badge-long' : 'badge-short'}">${s.direction}</span>
      </div>
    </div>
    <div class="card-body">
      <div class="price-row">
        <span class="price-big">$${s.price.toFixed(2)}</span>
        <span class="price-meta">RSI ${s.rsi} · ATR $${s.atr.toFixed(2)} · ${obLabel}</span>
      </div>
      <div class="ind-grid">
        <div class="ind-cell"><div class="ind-label">BOS Level</div><div class="ind-value">$${s.bos_level != null ? s.bos_level.toFixed(2) : '—'}</div></div>
        <div class="ind-cell"><div class="ind-label">OB High</div><div class="ind-value">$${s.ob_high != null ? s.ob_high.toFixed(2) : '—'}</div></div>
        <div class="ind-cell"><div class="ind-label">OB Low</div><div class="ind-value">$${s.ob_low != null ? s.ob_low.toFixed(2) : '—'}</div></div>
      </div>
      <table class="levels-table">
        <thead><tr><th>Level</th><th>Price</th><th>R:R</th></tr></thead>
        <tbody>
          <tr><td class="level-sl">Stop Loss</td><td class="level-sl">$${s.sl.toFixed(2)}</td><td class="rr">—</td></tr>
          <tr><td class="level-entry">Entry (OB mid)</td><td class="level-entry">$${s.entry.toFixed(2)}</td><td class="rr">1R = $${s.risk.toFixed(2)} (${riskPct}%)</td></tr>
          <tr><td class="level-tp">TP1</td><td class="level-tp">$${s.tp1.toFixed(2)}</td><td class="rr">2R</td></tr>
          <tr><td class="level-tp">TP2</td><td class="level-tp">$${s.tp2.toFixed(2)}</td><td class="rr">3R</td></tr>
          <tr><td class="level-tp">TP3</td><td class="level-tp">$${s.tp3.toFixed(2)}</td><td class="rr">4R</td></tr>
        </tbody>
      </table>
      <div class="option-box">
        <div class="option-label">Suggested Option · ${s.option.dte} DTE</div>
        <div class="option-symbol">${s.option.symbol}</div>
        <div class="option-meta">Strike $${s.option.strike} · Expiry ${s.option.expiry}</div>
      </div>
      ${coachBox}
      <div class="checklist">
        ${ci(c.trendConfirmed, 'Trend confirmed')}
        ${ci(c.bosConfirmed,   'BOS confirmed')}
        ${ci(c.obFound,        'OB identified')}
        ${ci(c.priceAtOb,      'Price at OB zone')}
      </div>
    </div>
    <div class="card-footer">
      <button class="btn-log btn-sm" onclick="openLogModal(decodeURIComponent('${encoded}'))">📊 Log Trade</button>
    </div>
  </div>`;
}

function renderCoachBox(q) {
  if (!q || !q.grade) return '';
  return `
    <div class="coach-box">
      <div class="coach-head">
        <div class="coach-title">Chart Coach</div>
        <div class="coach-score">Quality ${q.score ?? '—'}/100${q.raw_score && q.raw_score !== q.score ? ` · raw ${q.raw_score}` : ''}</div>
      </div>
      ${q.grade_note ? `<div class="coach-grade-note">${q.grade_note}</div>` : ''}
      <div class="coach-grid">
        <div class="coach-metric"><div class="coach-label">Location</div><div class="coach-value">${q.location || '—'}</div></div>
        <div class="coach-metric"><div class="coach-label">Cleanliness</div><div class="coach-value">${q.cleanliness || '—'}</div></div>
        <div class="coach-metric"><div class="coach-label">Freshness</div><div class="coach-value">${q.freshness || '—'}</div></div>
        <div class="coach-metric"><div class="coach-label">Room</div><div class="coach-value">${q.room_to_target || '—'}</div></div>
      </div>
      <div class="coach-note">${q.coach_note || 'Review structure, location, and reaction before entry.'}</div>
      <div class="coach-warning">${q.warning || 'No major visual warning.'}</div>
      <div class="coach-prompt">Training question: ${q.training_prompt || 'What would invalidate this idea?'}</div>
    </div>`;
}

function renderNearMissCard(s) {
  const isLong    = s.direction === 'LONG';
  const hasTrend  = s.trend && s.trend !== 'NEUTRAL';
  const hasBOS    = s.bos_confirmed;
  const hasOB     = s.ob_high != null && s.ob_low != null;
  const atOB      = s.in_ob || s.near_ob;
  const q          = s.quality || {};
  const grade      = q.grade || 'D';
  const gradeCls   = gradeClass(grade);
  const ci        = (pass, label) =>
    `<div class="check-item ${pass ? 'pass' : 'fail'}"><span class="icon">${pass ? '✓' : '✗'}</span>${label}</div>`;

  let missing = '';
  if (!hasBOS)      missing = 'Waiting for BOS — no confirmed break of structure yet.';
  else if (!hasOB)  missing = 'BOS confirmed but no OB identified in recent structure.';
  else if (!atOB)   missing = `Waiting for pullback into OB zone ($${s.ob_low?.toFixed(2)} – $${s.ob_high?.toFixed(2)}).`;

  const dirColor = isLong ? 'var(--long)' : 'var(--short)';
  const dirBg    = isLong ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)';

  return `
  <div class="card" style="opacity:0.88; border-color: rgba(251,191,36,0.25);">
    <div class="card-header" style="border-color: rgba(251,191,36,0.15);">
      <span class="ticker">${s.ticker}</span>
      <div class="card-header-right">
        ${q.grade ? `<span class="grade-badge ${gradeCls}" title="Chart quality grade">${grade}</span>` : ''}
        ${hasTrend ? `<span class="badge" style="background:${dirBg}; color:${dirColor};">${s.direction}</span>` : ''}
        <span class="badge" style="background:rgba(251,191,36,0.12); color:#fbbf24;">DEVELOPING</span>
      </div>
    </div>
    <div class="card-body">
      <div class="price-row">
        <span class="price-big">$${s.price.toFixed(2)}</span>
        <span class="price-meta">RSI ${s.rsi} · ATR $${s.atr.toFixed(2)}</span>
      </div>
      <div class="checklist" style="border-top:none; padding-top:0; margin-bottom:10px;">
        ${ci(hasTrend, `Trend confirmed (${s.trend || 'NEUTRAL'})`)}
        ${ci(hasBOS,   'BOS confirmed')}
        ${ci(hasOB,    'OB identified')}
        ${ci(atOB,     s.in_ob ? 'Price inside OB' : s.near_ob ? 'Price near OB' : 'Price at OB zone')}
      </div>
      ${missing ? `<div style="font-size:11px; color:#fca5a5; background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.18); border-radius:5px; padding:6px 10px; margin-bottom:8px;">${missing}</div>` : ''}
      ${renderCoachBox(q)}
      <div style="display:flex; gap:14px; font-size:11px; color:var(--muted); flex-wrap:wrap;">
        ${hasBOS && s.bos_level ? `<span>BOS @ $${s.bos_level.toFixed(2)}</span>` : ''}
        ${hasOB ? `<span>OB $${s.ob_low?.toFixed(2)}–$${s.ob_high?.toFixed(2)}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// ── Modal ────────────────────────────────────────────────────────────────────

let _editId = null;
let _pendingSetup = null;

function setSetupReviewBox(entryOrSetup = null) {
  const q = entryOrSetup?.quality || null;
  const grade = q?.grade || entryOrSetup?.setupGrade || null;
  const score = q?.score ?? entryOrSetup?.setupScore ?? null;
  const warning = q?.warning || entryOrSetup?.setupWarning || '';
  const coach = q?.coach_note || entryOrSetup?.setupCoachNote || '';
  const box = document.getElementById('setupReviewBox');
  if (!box) return;
  if (!entryOrSetup || (!grade && !warning && !coach)) {
    box.innerHTML = '<strong>Setup context</strong><br />Log from a scanner setup to attach grade, score, and coach context.';
    return;
  }
  box.innerHTML = `
    <strong>${grade ? `Grade ${grade}` : 'Setup context'}${score != null ? ` · ${score}/100` : ''}</strong><br />
    ${warning ? `Warning: ${warning}<br />` : ''}
    ${coach ? `Coach: ${coach}` : ''}`;
}

function setValue(id, value = '') {
  const el = document.getElementById(id);
  if (el) el.value = value ?? '';
}

function openLogModal(setupJson) {
  const s = typeof setupJson === 'string' ? JSON.parse(setupJson) : setupJson;
  _editId = null;
  _pendingSetup = s;
  setSetupReviewBox(s);
  document.getElementById('modal-title').textContent   = '📊 Log Trade';
  document.getElementById('modalSaveBtn').textContent  = 'Save Trade';
  setValue('f_ticker', s.ticker || '');
  setValue('f_direction', s.direction || 'LONG');
  setValue('f_option', s.option?.symbol || '');
  setValue('f_entry', s.entry || '');
  setValue('f_plannedStop', s.sl || '');
  setValue('f_plannedTp1', s.tp1 || '');
  setValue('f_rResult', '');
  setValue('f_expiry', s.option?.expiry || '');
  setValue('f_contracts', 1);
  setValue('f_result', 'Open');
  setValue('f_exit', '');
  setValue('f_pnl', '');
  setValue('f_tradeQuality', 'Unreviewed');
  setValue('f_followedPlan', 'Unreviewed');
  setValue('f_outcome', 'Open');
  setValue('f_mistakeType', '');
  setValue('f_notes', '');
  // Lock ticker/direction/option/entry for new entries from scanner
  ['f_ticker','f_direction','f_option','f_entry','f_expiry'].forEach(id => {
    document.getElementById(id).disabled = true;
  });
  document.getElementById('logModal').classList.add('open');
}

function openEditModal(id) {
  const entry = loadJournal().find(e => e.id === id);
  if (!entry) return;
  _editId = id;
  _pendingSetup = null;
  setSetupReviewBox(entry);
  document.getElementById('modal-title').textContent  = '✏️ Edit Trade';
  document.getElementById('modalSaveBtn').textContent = 'Update Trade';
  setValue('f_ticker', entry.ticker || '');
  setValue('f_direction', entry.direction || 'LONG');
  setValue('f_option', entry.option || '');
  setValue('f_entry', entry.entry ?? '');
  setValue('f_plannedStop', entry.plannedStop ?? '');
  setValue('f_plannedTp1', entry.plannedTp1 ?? '');
  setValue('f_rResult', entry.rResult ?? '');
  setValue('f_expiry', entry.expiry || '');
  setValue('f_contracts', entry.contracts || 1);
  setValue('f_result', entry.result || 'Open');
  setValue('f_exit', entry.exit ?? '');
  setValue('f_pnl', entry.pnl ?? '');
  setValue('f_tradeQuality', entry.tradeQuality || 'Unreviewed');
  setValue('f_followedPlan', entry.followedPlan || 'Unreviewed');
  setValue('f_outcome', entry.outcome || entry.result || 'Open');
  setValue('f_mistakeType', entry.mistakeType || '');
  setValue('f_notes', entry.notes || '');
  // All fields editable when editing
  ['f_ticker','f_direction','f_option','f_entry','f_expiry'].forEach(id => {
    document.getElementById(id).disabled = false;
  });
  document.getElementById('logModal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('logModal')) closeModalDirect();
}
function closeModalDirect() {
  _pendingSetup = null;
  setSetupReviewBox();
  document.getElementById('logModal').classList.remove('open');
}

function syncResultFromOutcome() {
  const outcome = document.getElementById('f_outcome').value;
  const result = document.getElementById('f_result');
  if (outcome === 'Open') result.value = 'Open';
  else if (outcome === 'Stop Loss' || outcome === 'Expired') result.value = 'Loss';
  else if (['TP1', 'TP2', 'TP3'].includes(outcome)) result.value = 'Win';
}

function recalcTradeMath() {
  const entry     = parseFloat(document.getElementById('f_entry').value) || 0;
  const exit      = parseFloat(document.getElementById('f_exit').value)  || 0;
  const stop      = parseFloat(document.getElementById('f_plannedStop').value) || 0;
  const contracts = parseInt(document.getElementById('f_contracts').value) || 1;
  const dir       = document.getElementById('f_direction').value;
  if (entry && exit) {
    const pnl = (dir === 'LONG' ? exit - entry : entry - exit) * contracts * 100;
    document.getElementById('f_pnl').value = pnl.toFixed(2);
  }
  if (entry && exit && stop && Math.abs(entry - stop) > 0) {
    const risk = Math.abs(entry - stop);
    const r = dir === 'LONG' ? (exit - entry) / risk : (entry - exit) / risk;
    document.getElementById('f_rResult').value = r.toFixed(2);
  }
}

// Auto-calc P&L and R when trade levels change
['f_exit','f_entry','f_plannedStop','f_contracts','f_direction'].forEach(id => {
  document.getElementById(id).addEventListener('input', recalcTradeMath);
});
document.getElementById('f_outcome').addEventListener('change', syncResultFromOutcome);

function saveJournalEntry() {
  const ticker = document.getElementById('f_ticker').value.trim().toUpperCase();
  if (!ticker) { alert('Ticker is required'); return; }
  const updated = {
    ticker,
    direction: document.getElementById('f_direction').value,
    option:    document.getElementById('f_option').value.trim(),
    entry:     parseFloat(document.getElementById('f_entry').value)   || null,
    plannedStop: parseFloat(document.getElementById('f_plannedStop').value) || null,
    plannedTp1:  parseFloat(document.getElementById('f_plannedTp1').value)  || null,
    exit:      parseFloat(document.getElementById('f_exit').value)    || null,
    contracts: parseInt(document.getElementById('f_contracts').value) || 1,
    expiry:    document.getElementById('f_expiry').value.trim(),
    result:    document.getElementById('f_result').value,
    pnl:       parseFloat(document.getElementById('f_pnl').value)     || null,
    rResult:   parseFloat(document.getElementById('f_rResult').value) || null,
    tradeQuality: document.getElementById('f_tradeQuality').value,
    followedPlan: document.getElementById('f_followedPlan').value,
    outcome: document.getElementById('f_outcome').value,
    mistakeType: document.getElementById('f_mistakeType').value,
    notes: document.getElementById('f_notes').value.trim(),
  };
  if (_pendingSetup?.quality) {
    updated.setupGrade = _pendingSetup.quality.grade || null;
    updated.setupScore = _pendingSetup.quality.score ?? null;
    updated.setupRawScore = _pendingSetup.quality.raw_score ?? null;
    updated.setupLocation = _pendingSetup.quality.location || '';
    updated.setupCleanliness = _pendingSetup.quality.cleanliness || '';
    updated.setupFreshness = _pendingSetup.quality.freshness || '';
    updated.setupRoom = _pendingSetup.quality.room_to_target || '';
    updated.setupWarning = _pendingSetup.quality.warning || '';
    updated.setupCoachNote = _pendingSetup.quality.coach_note || '';
    updated.plannedStop = _pendingSetup.sl ?? updated.plannedStop;
    updated.plannedTp1 = _pendingSetup.tp1 ?? updated.plannedTp1;
    updated.plannedTp2 = _pendingSetup.tp2 ?? null;
    updated.plannedTp3 = _pendingSetup.tp3 ?? null;
  }
  const entries = loadJournal();
  if (_editId !== null) {
    const idx = entries.findIndex(e => e.id === _editId);
    if (idx !== -1) entries[idx] = { ...entries[idx], ...updated };
  } else {
    entries.push({ id: Date.now(), date: new Date().toISOString().slice(0, 10), ...updated });
  }
  saveJournal(entries);
  closeModalDirect();
}

// ── Journal storage ──────────────────────────────────────────────────────────

function loadJournal() {
  try { return JSON.parse(localStorage.getItem(JOURNAL_KEY) || '[]'); }
  catch { return []; }
}
function saveJournal(entries) {
  localStorage.setItem(JOURNAL_KEY, JSON.stringify(entries));
  renderJournal();
  renderAnalytics();
}
function clearJournal() {
  if (confirm('Delete all journal entries?')) { localStorage.removeItem(JOURNAL_KEY); renderJournal(); renderAnalytics(); }
}
function deleteEntry(id) {
  saveJournal(loadJournal().filter(e => e.id !== id));
}

// ── Journal render ───────────────────────────────────────────────────────────

function renderJournal() {
  const all       = loadJournal();
  const fTicker   = (document.getElementById('filterTicker')?.value   || '').toUpperCase().trim();
  const fGrade    = document.getElementById('filterGrade')?.value || '';
  const fDir      = document.getElementById('filterDirection')?.value || '';
  const fResult   = document.getElementById('filterResult')?.value    || '';
  const fQuality  = document.getElementById('filterQuality')?.value   || '';

  const filtered = all.filter(e =>
    (!fTicker  || e.ticker.includes(fTicker)) &&
    (!fGrade   || (fGrade === 'Untracked' ? !e.setupGrade : e.setupGrade === fGrade)) &&
    (!fDir     || e.direction === fDir) &&
    (!fResult  || e.result === fResult) &&
    (!fQuality || (e.tradeQuality || 'Unreviewed') === fQuality)
  );

  // Stats (from all, not filtered)
  const wins   = all.filter(e => e.result === 'Win').length;
  const losses = all.filter(e => e.result === 'Loss').length;
  const closed = wins + losses;
  const winRate = closed > 0 ? ((wins / closed) * 100).toFixed(0) : '—';
  const totalPnl = all.reduce((sum, e) => sum + (e.pnl || 0), 0);
  const reviewed = all.filter(e => e.tradeQuality && e.tradeQuality !== 'Unreviewed').length;
  const avgPnl   = closed > 0
    ? (all.filter(e => e.result !== 'Open').reduce((s,e) => s + (e.pnl||0), 0) / closed)
    : 0;

  document.getElementById('journalStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Trades</div><div class="stat-value">${all.length}</div></div>
    <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value ${closed ? (wins/closed >= 0.5 ? 'green' : 'red') : 'muted'}">${winRate}${closed ? '%' : ''}</div></div>
    <div class="stat-card"><div class="stat-label">Wins / Losses</div><div class="stat-value">${wins} / ${losses}</div></div>
    <div class="stat-card"><div class="stat-label">Total P&amp;L</div><div class="stat-value ${totalPnl >= 0 ? 'green' : 'red'}">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(0)}</div></div>
    <div class="stat-card"><div class="stat-label">Avg P&amp;L</div><div class="stat-value ${avgPnl >= 0 ? 'green' : 'red'}">${avgPnl >= 0 ? '+' : ''}$${avgPnl.toFixed(0)}</div></div>
    <div class="stat-card"><div class="stat-label">Reviewed</div><div class="stat-value muted">${reviewed}</div></div>
  `;

  const body = document.getElementById('journalBody');
  if (filtered.length === 0) {
    body.innerHTML = '<div class="journal-empty">No journal entries yet. Log a trade from a scanner setup card.</div>';
    return;
  }

  const rows = filtered.slice().reverse().map(e => {
    const resultCls = e.result === 'Win' ? 'win' : e.result === 'Loss' ? 'loss' : 'open';
    const badgeCls  = e.result === 'Win' ? 'result-win' : e.result === 'Loss' ? 'result-loss' : 'result-open';
    const pnlStr = e.pnl != null
      ? `<span class="${e.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${e.pnl >= 0 ? '+' : ''}$${e.pnl.toFixed(2)}</span>`
      : '<span style="color:var(--muted)">—</span>';
    const dirCls = e.direction === 'LONG' ? 'style="color:var(--long)"' : 'style="color:var(--short)"';
    return `
      <tr class="${resultCls}">
        <td>${e.date}</td>
        <td><strong>${e.ticker}</strong></td>
        <td ${dirCls}>${e.direction}</td>
        <td>${e.setupGrade ? `<span class="grade-badge ${gradeClass(e.setupGrade)}">${e.setupGrade}</span>` : '—'}</td>
        <td>${e.option || '—'}</td>
        <td>${e.entry != null ? '$'+e.entry.toFixed(2) : '—'}</td>
        <td>${e.exit  != null ? '$'+e.exit.toFixed(2)  : '—'}</td>
        <td>${e.rResult != null ? e.rResult.toFixed(2)+'R' : '—'}</td>
        <td>${e.contracts}x</td>
        <td>${e.expiry || '—'}</td>
        <td>${pnlStr}</td>
        <td>${e.tradeQuality || 'Unreviewed'}</td>
        <td>${e.mistakeType || '—'}</td>
        <td><span class="result-badge ${badgeCls}">${e.result}</span></td>
        <td style="white-space:nowrap">
          <button class="edit-btn" onclick="openEditModal(${e.id})">✏️</button>
          <button class="delete-btn" onclick="deleteEntry(${e.id})">✕</button>
        </td>
      </tr>`;
  }).join('');

  body.innerHTML = `
    <table class="journal-table">
      <thead>
        <tr>
          <th>Date</th><th>Ticker</th><th>Dir</th><th>Grade</th><th>Option</th>
          <th>Entry</th><th>Exit</th><th>R</th><th>Qty</th><th>Expiry</th>
          <th>P&amp;L</th><th>Quality</th><th>Mistake</th><th>Result</th><th></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Analytics render ────────────────────────────────────────────────────────

function money(n) {
  return `${n >= 0 ? '+' : ''}$${Number(n || 0).toFixed(0)}`;
}

function calcStats(entries) {
  const wins = entries.filter(e => e.result === 'Win').length;
  const losses = entries.filter(e => e.result === 'Loss').length;
  const closed = wins + losses;
  const totalPnl = entries.reduce((sum, e) => sum + (e.pnl || 0), 0);
  return {
    trades: entries.length,
    closed,
    wins,
    losses,
    open: entries.filter(e => e.result === 'Open').length,
    winRate: closed ? Math.round((wins / closed) * 100) : null,
    totalPnl,
    avgPnl: closed ? totalPnl / closed : 0,
  };
}

function groupStats(entries, keyFn) {
  const map = new Map();
  entries.forEach(e => {
    const key = keyFn(e) || 'Untracked';
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(e);
  });
  return Array.from(map.entries()).map(([key, rows]) => ({ key, ...calcStats(rows) }));
}

function renderAnalyticsTable(rows, label = 'Group') {
  if (!rows.length) return '<div class="analytics-empty">No matching journal data yet.</div>';
  const body = rows.map(r => {
    const pnlCls = r.totalPnl >= 0 ? 'pnl-pos' : 'pnl-neg';
    const avgCls = r.avgPnl >= 0 ? 'pnl-pos' : 'pnl-neg';
    return `
      <tr>
        <td><strong>${r.key}</strong></td>
        <td>${r.trades}</td>
        <td>${r.closed}</td>
        <td>${r.winRate == null ? '—' : r.winRate + '%'}</td>
        <td class="${pnlCls}">${money(r.totalPnl)}</td>
        <td class="${avgCls}">${money(r.avgPnl)}</td>
      </tr>`;
  }).join('');
  return `
    <table class="analytics-table">
      <thead>
        <tr><th>${label}</th><th>Total</th><th>Closed</th><th>Win %</th><th>P&amp;L</th><th>Avg</th></tr>
      </thead>
      <tbody>${body}</tbody>
    </table>`;
}

function renderAnalytics() {
  const all = loadJournal();
  const closed = all.filter(e => e.result !== 'Open');
  const withGrade = all.filter(e => e.setupGrade);
  const stats = calcStats(all);
  const gradeRows = groupStats(withGrade, e => e.setupGrade)
    .sort((a, b) => gradeRank(b.key) - gradeRank(a.key));
  const directionRows = groupStats(all, e => e.direction)
    .sort((a, b) => b.trades - a.trades);
  const tickerRows = groupStats(all, e => e.ticker)
    .sort((a, b) => b.trades - a.trades || b.totalPnl - a.totalPnl)
    .slice(0, 8);
  const qualityRows = groupStats(all, e => e.tradeQuality || 'Unreviewed')
    .sort((a, b) => b.trades - a.trades);
  const mistakeRows = groupStats(all.filter(e => e.mistakeType), e => e.mistakeType)
    .sort((a, b) => b.trades - a.trades);
  const openRows = groupStats(all.filter(e => e.result === 'Open'), e => e.setupGrade || 'Untracked')
    .sort((a, b) => gradeRank(b.key) - gradeRank(a.key));

  document.getElementById('analyticsStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Logged Trades</div><div class="stat-value">${all.length}</div></div>
    <div class="stat-card"><div class="stat-label">Closed Trades</div><div class="stat-value">${closed.length}</div></div>
    <div class="stat-card"><div class="stat-label">Graded Trades</div><div class="stat-value">${withGrade.length}</div></div>
    <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value ${stats.winRate == null ? 'muted' : stats.winRate >= 50 ? 'green' : 'red'}">${stats.winRate == null ? '—' : stats.winRate + '%'}</div></div>
    <div class="stat-card"><div class="stat-label">Total P&amp;L</div><div class="stat-value ${stats.totalPnl >= 0 ? 'green' : 'red'}">${money(stats.totalPnl)}</div></div>
    <div class="stat-card"><div class="stat-label">Avg Closed P&amp;L</div><div class="stat-value ${stats.avgPnl >= 0 ? 'green' : 'red'}">${money(stats.avgPnl)}</div></div>
  `;

  document.getElementById('analyticsByGrade').innerHTML = renderAnalyticsTable(gradeRows, 'Grade');
  document.getElementById('analyticsByDirection').innerHTML = renderAnalyticsTable(directionRows, 'Direction');
  document.getElementById('analyticsByTicker').innerHTML = renderAnalyticsTable(tickerRows, 'Ticker');
  document.getElementById('analyticsByQuality').innerHTML = renderAnalyticsTable(qualityRows, 'Quality');
  document.getElementById('analyticsByMistake').innerHTML = renderAnalyticsTable(mistakeRows, 'Mistake');
  document.getElementById('analyticsOpenTrades').innerHTML = renderAnalyticsTable(openRows, 'Grade');
}

// ── CSV Export ───────────────────────────────────────────────────────────────

function exportCSV() {
  const entries = loadJournal();
  if (!entries.length) { alert('No entries to export.'); return; }
  const headers = ['Date','Ticker','Direction','Grade','Score','Location','Cleanliness','Freshness','Room','Warning','Option','Entry','Stop','TP1','Exit','R','Contracts','Expiry','PnL','TradeQuality','FollowedPlan','Outcome','Mistake','Notes','Result'];
  const rows = entries.map(e => [
    e.date, e.ticker, e.direction, e.setupGrade || '', e.setupScore ?? '',
    `"${e.setupLocation || ''}"`, `"${e.setupCleanliness || ''}"`, `"${e.setupFreshness || ''}"`, `"${e.setupRoom || ''}"`, `"${e.setupWarning || ''}"`,
    `"${e.option||''}"`,
    e.entry ?? '', e.plannedStop ?? '', e.plannedTp1 ?? '', e.exit ?? '', e.rResult ?? '', e.contracts, e.expiry,
    e.pnl ?? '', `"${e.tradeQuality || ''}"`, `"${e.followedPlan || ''}"`, `"${e.outcome || ''}"`, `"${e.mistakeType || ''}"`, `"${e.notes || ''}"`, e.result,
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `stock_journal_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Init ─────────────────────────────────────────────────────────────────────
runScan();
</script>
